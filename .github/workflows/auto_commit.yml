name: Daily Insight Commit

on:
  schedule:
    # Runs at 08:00 and 20:00 UTC every day
    - cron: '0 8,20 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run script to generate insight
        run: python generate_insight.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Daily_Insights.md
          git commit -m "docs: Add daily C++/Python insight" || echo "No changes to commit"
          git push
